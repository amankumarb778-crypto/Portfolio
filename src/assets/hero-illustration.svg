<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Elements -->
  <circle cx="400" cy="300" r="200" fill="url(#grad1)" opacity="0.1" filter="url(#glow)" />
  <circle cx="500" cy="200" r="100" fill="url(#grad2)" opacity="0.15" filter="url(#glow)" />

  <!-- Abstract Laptop/Screen Base -->
  <rect x="200" y="150" width="400" height="260" rx="20" fill="#1e293b" stroke="url(#grad1)" stroke-width="4" />
  <rect x="220" y="170" width="360" height="220" rx="10" fill="#0f172a" />
  
  <!-- Screen Content -->
  <rect x="240" y="190" width="100" height="10" rx="5" fill="#3b82f6" opacity="0.5" />
  <rect x="240" y="210" width="180" height="10" rx="5" fill="#e2e8f0" opacity="0.2" />
  <rect x="240" y="230" width="160" height="10" rx="5" fill="#e2e8f0" opacity="0.2" />
  <rect x="240" y="250" width="140" height="10" rx="5" fill="#e2e8f0" opacity="0.2" />

  <!-- Box 1: Code Icon -->
  <rect x="240" y="280" width="80" height="80" rx="10" fill="url(#grad2)" opacity="0.8" />
  <g transform="translate(280, 320)">
    <text x="-15" y="5" font-family="monospace" font-size="24" fill="#fff" opacity="0.9">&lt;/&gt;</text>
  </g>
  
  <!-- Box 2: Design/Palette Icon -->
  <rect x="340" y="280" width="80" height="80" rx="10" fill="#3b82f6" opacity="0.3" />
  <g transform="translate(380, 320)">
    <circle cx="-10" cy="-5" r="3" fill="#ef4444" opacity="0.9"/>
    <circle cx="0" cy="-5" r="3" fill="#22c55e" opacity="0.9"/>
    <circle cx="10" cy="-5" r="3" fill="#eab308" opacity="0.9"/>
    <path d="M -15 0 Q -15 10 0 10 Q 15 10 15 0" stroke="#fff" stroke-width="2" fill="none" opacity="0.8"/>
  </g>
  
  <!-- Box 3: Rocket/Launch Icon -->
  <rect x="440" y="280" width="80" height="80" rx="10" fill="#3b82f6" opacity="0.3" />
  <g transform="translate(480, 320)">
    <path d="M 0 -12 L -6 8 L 0 4 L 6 8 Z" fill="#fff" opacity="0.9"/>
    <circle cx="0" cy="-4" r="2" fill="#c084fc"/>
    <path d="M -8 8 L -10 12" stroke="#eab308" stroke-width="2" opacity="0.8"/>
    <path d="M 8 8 L 10 12" stroke="#eab308" stroke-width="2" opacity="0.8"/>
  </g>

  <!-- Code decorations -->
  <circle cx="550" cy="190" r="5" fill="#ef4444" />
  <circle cx="535" cy="190" r="5" fill="#eab308" />
  <circle cx="520" cy="190" r="5" fill="#22c55e" />

  <!-- Floating Elements -->
  <g transform="translate(0, 0)">
    <rect x="650" y="100" width="60" height="60" rx="12" fill="#fff" opacity="0.1" transform="rotate(15 680 130)" />
    <rect x="100" y="400" width="50" height="50" rx="10" fill="#fff" opacity="0.05" transform="rotate(-10 125 425)" />
  </g>

  <!-- Laptop Stand -->
  <path d="M 250 420 L 550 420 L 580 450 L 220 450 Z" fill="#334155" opacity="0.9" />
  
</svg>
